services:
  rabbitmq:
    image: rabbitmq:4.3-management
    container_name: homework-rabbitmq
    restart: no
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_WEB}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  rabbitmq_data: